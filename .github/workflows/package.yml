name: build-deb

on:
  push:
  pull_request:

jobs:
  test:
    name: prove
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Perl dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            perl \
            libmodern-perl-perl \
            libconfig-tiny-perl \
            libjson-perl \
            libio-socket-ssl-perl

      - name: Run tests
        run: prove -v t/

  build:
    name: build (stretch)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src

      - name: Build package in debian:stretch-slim
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker run --rm \
              -v "$GITHUB_WORKSPACE":/build \
              -e VERSION="$VERSION" \
              debian:stretch-slim \
              bash -euxc '
                cat > /etc/apt/sources.list <<EOF
          deb http://archive.debian.org/debian stretch main
          deb http://archive.debian.org/debian-security stretch/updates main
          EOF
                echo "Acquire::Check-Valid-Until \"false\";" \
                    > /etc/apt/apt.conf.d/99no-check-valid-until
                export DEBIAN_FRONTEND=noninteractive
                apt-get update
                apt-get install -y --no-install-recommends \
                  build-essential \
                  devscripts \
                  debhelper \
                  dh-systemd \
                  fakeroot \
                  lintian \
                  ca-certificates \
                  perl \
                  libconfig-tiny-perl \
                  libjson-perl \
                  libio-socket-ssl-perl \
                  libmodern-perl-perl
                cd /build/src
                sed -i "1s|([^)]*)|($VERSION)|" debian/changelog
                sed -i "s|^my \$VERSION = .*|my \$VERSION = '"'"'$VERSION'"'"';|" elastic-heap-monitor.pl
                head -1 debian/changelog
                grep "^my \$VERSION" elastic-heap-monitor.pl
                dpkg-buildpackage -us -uc -b
              '

      - name: Move artifacts into workspace
        run: |
          mkdir -p artifacts
          mv *.deb       artifacts/ 2>/dev/null || true
          mv *.buildinfo artifacts/ 2>/dev/null || true
          mv *.changes   artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Lintian
        run: |
          docker run --rm \
              -v "$GITHUB_WORKSPACE":/build \
              -w /build \
              debian:stretch-slim \
              bash -euxc '
                cat > /etc/apt/sources.list <<EOF
          deb http://archive.debian.org/debian stretch main
          EOF
                echo "Acquire::Check-Valid-Until \"false\";" \
                    > /etc/apt/apt.conf.d/99no-check-valid-until
                export DEBIAN_FRONTEND=noninteractive
                apt-get update
                apt-get install -y --no-install-recommends lintian
                lintian --fail-on error \
                    --suppress-tags bad-distribution-in-changes-file \
                    artifacts/*.deb || true
              '

      - uses: actions/upload-artifact@v4
        with:
          name: elastic-heap-monitor_stretch
          path: artifacts/*

  release:
    name: attach to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten
        run: |
          mkdir -p release
          find dist -name '*.deb' -exec cp {} release/ \;
          ls -la release/
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*.deb
