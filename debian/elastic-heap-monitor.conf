# /etc/elastic-heap-monitor/elastic-heap-monitor.conf
#
# Configuration for elastic-heap-monitor. See elastic-heap-monitor(1) or
# `elastic-heap-monitor --help` for the full list of settings.
#
# Each key corresponds to the long CLI flag name (without the leading --).
# Lines starting with # are comments.

# Slack incoming webhook URL (required for alerts).
#webhook = https://hooks.slack.com/services/XXX/YYY/ZZZ

# Explicit cluster definitions: semicolon-separated entries of name=url1,url2
#clusters = cluster1=http://es1:9200,http://es2:9200;cluster2=http://es3:9200

# Or, comma-separated server URLs for auto-discovery by cluster_name:
#servers = http://escluster701:9200,http://escluster702:9200

# If neither `clusters` nor `servers` is set, /etc/hosts is scanned for
# hostnames starting with `escluster` and those are auto-discovered.

# Check interval, in seconds.
interval = 60

# Heap thresholds, in percent.
warn = 80
crit = 90

# Minimum seconds between repeat alerts for the same condition.
cooldown = 1800

# HTTP request timeout, in seconds.
timeout = 10

# Log OK status for every node on every cycle.
#verbose = 1
